<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Ucapan Romantis</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #fce4ec; /* Pink muda latar belakang */
            font-family: 'Poppins', sans-serif;
            background-image: radial-gradient(#f8bbd0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .card {
            background-color: white;
            width: 350px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            transition: all 0.4s ease;
            border: 4px solid #fff; /* Bingkai dalam putih */
            outline: 2px solid #f48fb1; /* Garis luar pink */
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 40px rgba(233, 30, 99, 0.2);
        }

        /* Gaya Bingkai Foto */
        .photo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px auto; /* Ketengah dan beri jarak bawah */
            border-radius: 50%; /* Membuat melingkar */
            overflow: hidden; /* Memotong gambar yg keluar dari lingkaran */
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover .photo-container {
            transform: rotate(5deg) scale(1.05);
        }

        .couple-photo {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Agar gambar proporsional memenuhi lingkaran */
        }

        .heart-icon {
            color: #e91e63;
            font-size: 30px;
            margin-bottom: 10px;
            position: absolute;
            top: 20px;
            right: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        h1 {
            color: #880e4f;
            font-size: 28px;
            margin-bottom: 10px;
            margin-top: 0;
            font-family: 'Dancing Script', cursive; /* Font tulisan tangan untuk nama */
        }

        .divider {
            height: 2px;
            width: 50px;
            background-color: #f48fb1;
            margin: 10px auto 20px auto;
        }

        p {
            color: #616161;
            line-height: 1.8;
            font-style: italic;
            font-size: 15px;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .footer {
            font-size: 14px;
            color: white;
            font-weight: 600;
            background-color: #ec407a;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart-icon">❤️</div>

        <div class="photo-container">
            <img src="https://via.placeholder.com/150x150/f48fb1/ffffff?text=Foto+Kita" alt="Foto Pasangan" class="couple-photo">
        </div>

        <h1>Untuk Sayangku,</h1>
        <div class="divider"></div>
        
        <p>
            "Melihat wajahmu adalah caraku menemukan kebahagiaan paling sederhana. Terima kasih telah menjadi alasan di balik senyumku setiap hari. Aku mencintaimu lebih dari kata-kata yang bisa terucap."
        </p>
        
        <div class="footer">
            SELAMANYA BERSAMA
        </div>
    </div>

</body>
</html>
